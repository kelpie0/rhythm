<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rhythm.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #050505; color: #eeeeee;
            font-family: 'DM Sans', sans-serif;
            overflow: hidden; display: flex;
            justify-content: center; align-items: center;
            height: 100vh;
        }
        #gameCanvas {
            background-color: #0a0a0a;
            border-left: 1px solid #1a1a1a;
            border-right: 1px solid #1a1a1a;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        #drop-zone {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(5, 5, 5, 0.95);
            display: flex; justify-content: center;
            align-items: center; flex-direction: column;
            z-index: 10; pointer-events: auto;
            transition: opacity 0.5s ease;
        }
        #drop-zone.dragover { background: rgba(15, 15, 15, 0.98); }
        #drop-zone.hidden { opacity: 0; pointer-events: none; }
        h1 { margin: 0 0 8px 0; font-size: 36px; font-weight: 400; letter-spacing: -1.5px; }
        p { font-size: 16px; color: #666; margin: 0; font-weight: 400; }
        .hint { font-size: 12px; color: #444; margin-top: 30px; position: absolute; bottom: 40px;}
    </style>
</head>
<body>

    <div id="drop-zone">
        <h1>rhythm.</h1>
        <p>drop an mp3 or wav here.</p>
        <p class="hint">controls: a, s, k, l | pause: p | quit: esc</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- HIGH-DPI CANVAS SETUP ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GAME_WIDTH = 560;
        const GAME_HEIGHT = 800;
        
        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = GAME_WIDTH + 'px';
        canvas.style.height = GAME_HEIGHT + 'px';
        canvas.width = GAME_WIDTH * dpr;
        canvas.height = GAME_HEIGHT * dpr;
        ctx.scale(dpr, dpr);

        // --- GAME CONFIGURATION ---
        const dropZone = document.getElementById('drop-zone');
        const config = {
            keys: ['a', 's', 'k', 'l'], lanes: 4,
            laneWidth: 140, noteRadius: 48,
            hitPosition: 680, scrollSpeed: 1100,
            hitWindows: { perfect: 0.05, good: 0.1, miss: 0.15 }, 
            bpm: 120, 
        };

        // --- GAME STATE ---
        let audioCtx, audioSource, audioBuffer;
        let gameStartTime = 0;
        let isPlaying = false;
        let isPaused = false;
        let animationFrameId;
        
        let notes = [];
        let ripples = []; 
        let activeFlashes = [0, 0, 0, 0]; 
        let feedbackText = { text: "", alpha: 0, scale: 1, color: "", yOffset: 0 };
        
        let stats = { score: 0, combo: 0, maxCombo: 0, perfects: 0, goods: 0, misses: 0, total: 0 };
        const keyState = { 0: false, 1: false, 2: false, 3: false };

        // --- INPUT HANDLING ---
        window.addEventListener('keydown', async (e) => {
            if (e.key === 'Escape' && isPlaying) {
                endGame("game stopped."); return;
            }
            if (e.key.toLowerCase() === 'p' && isPlaying) {
                togglePause(); return;
            }

            if (e.repeat || isPaused || !isPlaying) return;
            const lane = config.keys.indexOf(e.key.toLowerCase());
            if (lane !== -1) {
                keyState[lane] = true;
                activeFlashes[lane] = 1.0;
                createRipple(lane);
                handleHit(lane);
            }
        });

        window.addEventListener('keyup', (e) => {
            const lane = config.keys.indexOf(e.key.toLowerCase());
            if (lane !== -1) keyState[lane] = false;
        });

        async function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                await audioCtx.suspend();
            } else {
                await audioCtx.resume();
            }
        }

        // --- DRAG & DROP LOGIC ---
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('audio/')) {
                dropZone.innerHTML = "<h1>loading...</h1><p>analyzing audio frequencies.</p>";
                loadAudioFile(file);
            } else {
                resetMenu("please drop a valid audio file (.mp3, .wav)");
            }
        });

        // --- AUDIO & NOTE GENERATION ---
        async function loadAudioFile(file) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    audioBuffer = await audioCtx.decodeAudioData(e.target.result);
                    dropZone.innerHTML = "<h1>ready.</h1><p>click anywhere to start.</p>";
                    dropZone.addEventListener('click', startGame, { once: true });
                } catch (err) {
                    resetMenu("error decoding audio.");
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function startGame() {
            dropZone.classList.add('hidden');
            stats = { score: 0, combo: 0, maxCombo: 0, perfects: 0, goods: 0, misses: 0, total: 0 };
            ripples = []; notes = []; isPaused = false;
            
            generateSmartChart(audioBuffer);
            
            audioSource = audioCtx.createBufferSource();
            audioSource.buffer = audioBuffer;
            audioSource.connect(audioCtx.destination);
            audioSource.onended = () => { if (isPlaying) endGame("track finished."); };
            
            gameStartTime = audioCtx.currentTime + 1.5;
            audioSource.start(gameStartTime);
            isPlaying = true;
            
            gameLoop();
        }

        function endGame(message) {
            isPlaying = false;
            cancelAnimationFrame(animationFrameId);
            if (audioSource) {
                audioSource.onended = null;
                try { audioSource.stop(); } catch(e) {}
                audioSource.disconnect();
            }
            const acc = getAccuracy();
            resetMenu(`${message}<br><br>score: ${stats.score} | acc: ${acc} | max combo: ${stats.maxCombo}<br><br>drop another file to play again.`);
        }

        function resetMenu(msg) {
            dropZone.classList.remove('hidden');
            dropZone.innerHTML = `<h1>rhythm.</h1><p style="text-align:center; line-height:1.5;">${msg}</p><p class="hint">controls: a, s, k, l | pause: p | quit: esc</p>`;
        }

        // --- SMART AUDIO ANALYSIS GENERATOR ---
        function generateSmartChart(buffer) {
            notes = [];
            const channelData = buffer.getChannelData(0);
            const sampleRate = buffer.sampleRate;
            
            // Analyze the audio track in 100ms chunks to map volume/energy
            const chunkSize = Math.floor(sampleRate * 0.1); 
            let energies = [];
            
            for (let i = 0; i < channelData.length; i += chunkSize) {
                let sum = 0;
                let count = 0;
                // Sample every 10th frame for performance
                for (let j = 0; j < chunkSize && i + j < channelData.length; j += 10) { 
                    sum += Math.abs(channelData[i + j]);
                    count++;
                }
                energies.push(sum / count);
            }
            
            const avgEnergy = energies.reduce((a, b) => a + b, 0) / energies.length;
            const beat = 60 / config.bpm;
            let time = 1.5;
            let lastLane = 0;
            
            while (time < buffer.duration - 2) {
                const chunkIdx = Math.floor(time * 10);
                const energy = energies[chunkIdx] || 0;
                
                // Base the intensity of the chart on the energy of the song
                if (energy > avgEnergy * 1.6) {
                    // High energy -> Chords (Jumps) or Hold Notes
                    if (Math.random() > 0.6) {
                        let l1 = Math.floor(Math.random() * 2);
                        let l2 = Math.floor(Math.random() * 2) + 2;
                        notes.push(createNote(time, l1, 0));
                        notes.push(createNote(time, l2, 0));
                    } else {
                        notes.push(createNote(time, Math.floor(Math.random() * 4), beat * 1.5));
                    }
                    time += beat / 2; // Fast sequence
                } else if (energy > avgEnergy * 0.85) {
                    // Medium energy -> Streams / Stairs
                    let nextLane = lastLane + (Math.random() > 0.5 ? 1 : -1);
                    if (nextLane < 0) nextLane = 1;
                    if (nextLane > 3) nextLane = 2;
                    notes.push(createNote(time, nextLane, 0));
                    lastLane = nextLane;
                    time += beat / 2; // Fast sequence
                } else if (energy > avgEnergy * 0.4) {
                    // Low energy -> Single beats
                    notes.push(createNote(time, Math.floor(Math.random() * 4), 0));
                    time += beat; // Slower sequence
                } else {
                    // Very quiet -> Sparse notes
                    if (Math.random() > 0.5) {
                        notes.push(createNote(time, Math.floor(Math.random() * 4), 0));
                    }
                    time += beat * 2; // Very slow sequence
                }
            }
        }

        function createNote(time, lane, duration) {
            return { 
                time, lane, duration, 
                hit: false, missed: false, 
                completed: false, isHolding: false, headHit: false 
            };
        }

        // --- GAME MECHANICS ---
        function getAccuracy() {
            if (stats.total === 0) return "100.00%";
            return (((stats.perfects + (stats.goods * 0.5)) / stats.total) * 100).toFixed(2) + "%";
        }

        function createRipple(lane) {
            ripples.push({ x: lane * config.laneWidth + config.laneWidth / 2, y: config.hitPosition, radius: config.noteRadius, alpha: 0.5 });
        }

        function registerHit(judgment) {
            stats.total++;
            if (judgment === "perfect") {
                stats.combo++; stats.perfects++; stats.score += 300;
                showFeedback("perfect", "#ffffff");
            } else if (judgment === "good") {
                stats.combo++; stats.goods++; stats.score += 100;
                showFeedback("good", "#888888");
            } else {
                stats.combo = 0; stats.misses++;
                showFeedback("miss", "#ff3333");
            }
            if (stats.combo > stats.maxCombo) stats.maxCombo = stats.combo;
        }

        function handleHit(lane) {
            const currentAudioTime = audioCtx.currentTime - gameStartTime;
            let targetNote = notes.find(n => n.lane === lane && !n.completed && !n.missed && !n.isHolding);
            if (!targetNote) return;

            const timeDiff = Math.abs(targetNote.time - currentAudioTime);

            if (timeDiff <= config.hitWindows.miss) {
                let judgment = timeDiff <= config.hitWindows.perfect ? "perfect" : 
                               timeDiff <= config.hitWindows.good ? "good" : "miss";
                
                if (judgment !== "miss") {
                    targetNote.headHit = true;
                    registerHit(judgment); // Register points for hitting the head
                    
                    if (targetNote.duration > 0) {
                        targetNote.isHolding = true; 
                    } else {
                        targetNote.completed = true;
                        targetNote.hit = true;
                    }
                } else {
                    targetNote.missed = true;
                    targetNote.completed = true;
                    registerHit("miss");
                }
            }
        }

        function showFeedback(text, color) {
            feedbackText = { text, color, alpha: 1.0, scale: 1.2, yOffset: 0 };
        }

        // --- RENDER LOOP ---
        function gameLoop() {
            if (!isPlaying) return;
            animationFrameId = requestAnimationFrame(gameLoop);
            
            const currentAudioTime = audioCtx.currentTime - gameStartTime;
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // 1. Draw Lanes & Receptors
            for (let i = 0; i < config.lanes; i++) {
                const x = i * config.laneWidth;
                const centerX = x + config.laneWidth / 2;
                
                ctx.strokeStyle = '#111'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GAME_HEIGHT); ctx.stroke();

                if (activeFlashes[i] > 0 && !isPaused) {
                    const gradient = ctx.createLinearGradient(0, config.hitPosition, 0, 0);
                    gradient.addColorStop(0, `rgba(255, 255, 255, ${activeFlashes[i] * 0.08})`);
                    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.fillStyle = gradient; ctx.fillRect(x, 0, config.laneWidth, config.hitPosition);
                    activeFlashes[i] -= 0.05; 
                }

                ctx.beginPath();
                ctx.arc(centerX, config.hitPosition, config.noteRadius, 0, Math.PI * 2);
                ctx.fillStyle = keyState[i] ? '#222' : '#0a0a0a'; ctx.fill();
                ctx.lineWidth = 3; ctx.strokeStyle = keyState[i] ? '#aaa' : '#333'; ctx.stroke();
            }

            if (!isPaused) {
                // 2. Ripples
                for (let i = ripples.length - 1; i >= 0; i--) {
                    const r = ripples[i];
                    ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${r.alpha})`; ctx.lineWidth = 2; ctx.stroke();
                    r.radius += 4; r.alpha -= 0.04;
                    if (r.alpha <= 0) ripples.splice(i, 1);
                }
            }

            // 3. Process & Draw Notes
            for (let note of notes) {
                if (note.completed) continue;

                const timeUntilHit = note.time - currentAudioTime;
                
                // Active Hold Note Logic Fix
                if (note.isHolding && !isPaused) {
                    if (!keyState[note.lane]) {
                        // Let go early = MISS
                        note.isHolding = false;
                        note.completed = true;
                        note.missed = true;
                        registerHit("miss"); 
                    } else if (currentAudioTime >= note.time + note.duration) {
                        // Successfully held to the end = BONUS PERFECT
                        note.isHolding = false;
                        note.completed = true;
                        note.hit = true;
                        registerHit("perfect"); 
                    }
                }

                // Initial Miss Logic (passed the receptor without pressing)
                if (timeUntilHit < -config.hitWindows.miss && !note.headHit && !note.missed) {
                    note.missed = true;
                    note.completed = true;
                    registerHit("miss");
                }

                if (note.missed) continue;

                // Calculate vertical positions
                let yHead = config.hitPosition - (timeUntilHit * config.scrollSpeed);
                const tailTimeUntilHit = (note.time + note.duration) - currentAudioTime;
                let yTail = config.hitPosition - (tailTimeUntilHit * config.scrollSpeed);

                // Lock head to receptor if actively holding
                if (note.isHolding) yHead = config.hitPosition;

                if (yTail < GAME_HEIGHT + 200 && yHead > -500) {
                    const centerX = (note.lane * config.laneWidth) + (config.laneWidth / 2);
                    const noteColor = (note.lane === 0 || note.lane === 3) ? '#999999' : '#ffffff';
                    
                    // Draw Hold Body
                    if (note.duration > 0) {
                        ctx.fillStyle = (note.lane === 0 || note.lane === 3) ? 'rgba(153, 153, 153, 0.2)' : 'rgba(255, 255, 255, 0.2)';
                        
                        // Prevent drawing body going upwards if holding
                        const bodyHeight = yHead - yTail;
                        if (bodyHeight > 0) {
                            ctx.fillRect(centerX - config.noteRadius, yTail, config.noteRadius * 2, bodyHeight);
                        }
                        
                        // Tail cap
                        ctx.beginPath(); ctx.arc(centerX, yTail, config.noteRadius, 0, Math.PI * 2); ctx.fill();
                    }

                    // Draw Note Head
                    ctx.beginPath();
                    ctx.arc(centerX, yHead, config.noteRadius, 0, Math.PI * 2);
                    ctx.fillStyle = noteColor; ctx.fill();
                }
            }

            // 4. Draw UI
            ctx.fillStyle = '#666'; ctx.font = '400 16px "DM Sans"'; ctx.textAlign = 'left';
            ctx.fillText(`score: ${stats.score}`, 20, 30);
            ctx.textAlign = 'center';
            ctx.fillText(`acc: ${getAccuracy()}`, GAME_WIDTH / 2, 30);
            ctx.textAlign = 'right';
            ctx.fillStyle = stats.misses > 0 ? '#ff5555' : '#666';
            ctx.fillText(`miss: ${stats.misses}`, GAME_WIDTH - 20, 30);

            // Center Feedback
            if (feedbackText.alpha > 0 && !isPaused) {
                ctx.save();
                feedbackText.yOffset -= 1;
                ctx.translate(GAME_WIDTH / 2, config.hitPosition - 160 + feedbackText.yOffset);
                ctx.scale(feedbackText.scale, feedbackText.scale);
                ctx.fillStyle = feedbackText.color; ctx.globalAlpha = feedbackText.alpha;
                ctx.font = '400 28px "DM Sans"'; ctx.textAlign = 'center';
                ctx.fillText(feedbackText.text, 0, 0);
                ctx.restore();
                feedbackText.alpha -= 0.02;
                if (feedbackText.scale > 1.0) feedbackText.scale -= 0.01;
            }

            // Combo Text
            if (stats.combo > 5) {
                const comboScale = isPaused ? 1 : 1 + (Math.sin(currentAudioTime * Math.PI * 8) * 0.05);
                ctx.save();
                ctx.translate(GAME_WIDTH / 2, GAME_HEIGHT / 2 - 80);
                ctx.scale(comboScale, comboScale);
                ctx.fillStyle = '#eeeeee'; ctx.font = '700 48px "DM Sans"';
                ctx.textAlign = 'center'; ctx.fillText(`${stats.combo}`, 0, 0);
                ctx.font = '400 16px "DM Sans"'; ctx.fillStyle = '#666';
                ctx.fillText(`combo`, 0, 25);
                ctx.restore();
            }

            // Pause Overlay
            if (isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.fillStyle = '#ffffff';
                ctx.font = '700 40px "DM Sans"';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', GAME_WIDTH / 2, GAME_HEIGHT / 2);
            }
        }
    </script>
</body>
</html>
