<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rhythm.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #050505; color: #eeeeee;
            font-family: 'DM Sans', sans-serif;
            overflow: hidden; display: flex;
            justify-content: center; align-items: center;
            height: 100vh;
        }
        #gameCanvas {
            background-color: #0a0a0a;
            border-left: 1px solid #1a1a1a;
            border-right: 1px solid #1a1a1a;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        #drop-zone {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(5, 5, 5, 0.95);
            display: flex; justify-content: center;
            align-items: center; flex-direction: column;
            z-index: 10; pointer-events: auto;
            transition: opacity 0.5s ease;
        }
        #drop-zone.dragover { background: rgba(15, 15, 15, 0.98); }
        #drop-zone.hidden { opacity: 0; pointer-events: none; }
        
        h1 { margin: 0 0 8px 0; font-size: 36px; font-weight: 400; letter-spacing: -1.5px; }
        p { font-size: 16px; color: #666; margin: 0; font-weight: 400; text-align: center; line-height: 1.5; }
        .hint { font-size: 12px; color: #444; margin-top: 30px; position: absolute; bottom: 40px;}
        
        .menu-controls { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .toggle-container { display: flex; align-items: center; gap: 12px; background: rgba(20, 20, 20, 0.8); padding: 16px 24px; border-radius: 8px; border: 1px solid #222; cursor: pointer; transition: border-color 0.2s; width: 240px; box-sizing: border-box; justify-content: center; }
        .toggle-container:hover { border-color: #555; }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: #eeeeee; cursor: pointer; }
        
        input[type="range"] { -webkit-appearance: none; background: #222; height: 6px; border-radius: 3px; outline: none; margin-top: 8px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #eee; cursor: pointer; transition: transform 0.1s; }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .play-btn { background: #eeeeee; color: #050505; border: none; padding: 14px 40px; font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: transform 0.1s, background 0.2s; margin-top: 10px; width: 240px; }
        .play-btn:hover { background: #ffffff; transform: scale(1.03); }

        /* Progress Bar Styles */
        .progress-wrapper { width: 300px; margin-top: 24px; display: none; }
        .progress-track { background: #222; border-radius: 8px; height: 8px; overflow: hidden; width: 100%; border: 1px solid #333; }
        .progress-fill { height: 100%; width: 0%; background: #eee; transition: width 0.1s linear; }
        .progress-text-row { display: flex; justify-content: space-between; margin-top: 8px; font-size: 13px; color: #888; font-family: monospace; }

        /* --- SETTINGS PANEL & BUTTON --- */
        #settingsBtn {
            position: absolute; top: 24px; right: 24px;
            width: 32px; height: 32px; cursor: pointer; z-index: 30;
            fill: #666; transition: fill 0.2s, transform 0.3s;
            pointer-events: auto;
        }
        #settingsBtn:hover { fill: #eee; transform: rotate(45deg); }
        
        #settingsPanel {
            position: absolute; top: 0; right: -380px; 
            width: 380px; height: 100vh;
            background: rgba(10, 10, 10, 0.98);
            border-left: 1px solid #222;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            z-index: 25; padding: 40px 24px; box-sizing: border-box;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; gap: 24px;
            overflow-y: auto;
        }
        #settingsPanel.open { right: 0; }
        #settingsPanel h2 { font-size: 20px; font-weight: 400; margin: 0; letter-spacing: -0.5px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        .setting-group { display: flex; flex-direction: column; gap: 8px; }
        .setting-group label { font-size: 13px; color: #666; text-transform: lowercase; }
        
        .keybind-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; box-sizing: border-box; }
        .key-input { width: 100%; box-sizing: border-box; background: #151515; border: 1px solid #333; border-radius: 4px; color: #fff; text-align: center; padding: 8px 0; font-family: inherit; font-size: 14px; cursor: pointer; transition: border-color 0.2s; text-transform: uppercase; }
        .key-input:focus { border-color: #eee; outline: none; background: #222; }
        
        select { background: #151515; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 4px; font-family: inherit; cursor: pointer; outline: none; width: 100%; box-sizing: border-box;}
        select:focus { border-color: #eee; }

        .preview-container {
            display: flex; justify-content: center; align-items: center;
            background: #111; padding: 20px; border-radius: 8px;
            border: 1px solid #333; height: 80px;
        }

        #soundDropzone {
            border: 1px dashed #444; background: #111;
            padding: 20px; border-radius: 6px; text-align: center;
            font-size: 13px; color: #555; cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        #soundDropzone.dragover { border-color: #eee; background: #1a1a1a; color: #aaa; }
        #soundDropzone.loaded { border-color: #44aa44; color: #44aa44; border-style: solid; }
    </style>
</head>
<body>

    <svg id="settingsBtn" viewBox="0 0 24 24">
        <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
    </svg>

    <div id="settingsPanel">
        <h2>settings.</h2>
        
        <div class="setting-group">
            <label>keybinds</label>
            <div class="keybind-grid">
                <input type="text" class="key-input" id="key0" readonly>
                <input type="text" class="key-input" id="key1" readonly>
                <input type="text" class="key-input" id="key2" readonly>
                <input type="text" class="key-input" id="key3" readonly>
            </div>
        </div>

        <div class="setting-group">
            <label>note preview</label>
            <div class="preview-container">
                <canvas id="previewCanvas" width="160" height="80"></canvas>
            </div>
        </div>

        <div class="setting-group">
            <label>note style</label>
            <select id="noteStyleSelect">
                <option value="circle">circles</option>
                <option value="bar">bars</option>
            </select>
        </div>

        <div class="setting-group">
            <label>color theme</label>
            <select id="colorThemeSelect">
                <option value="minimal">minimal (light/dark gray)</option>
                <option value="emerald">emerald vibrant</option>
                <option value="ruby">ruby crimson</option>
                <option value="neon">neon cyber</option>
            </select>
        </div>

        <div class="setting-group">
            <label>custom hit sound</label>
            <div id="soundDropzone">drop .mp3/.wav here to change hit sound</div>
        </div>
    </div>

    <div id="drop-zone">
        <h1 id="menuTitle">rhythm.</h1>
        <p id="menuSubtitle">drop an mp3 or wav here.</p>
        
        <div class="progress-wrapper" id="progressWrapper">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text-row">
                <span id="progressPercent">0%</span>
                <span id="progressETA">ETA: --s</span>
            </div>
        </div>

        <div class="menu-controls" id="menuControls" style="display: none;">
            <label class="toggle-container" for="holdToggle">
                <input type="checkbox" id="holdToggle" checked>
                <span style="font-size: 16px; color: #ddd;">enable hold notes</span>
            </label>
            <div class="toggle-container" style="flex-direction: column; align-items: stretch; gap: 8px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 14px; color: #aaa;">difficulty</span>
                    <span id="diffDisplay" style="font-size: 16px; color: #fff; font-weight: 700;">5</span>
                </div>
                <input type="range" id="diffSlider" min="1" max="15" value="5">
            </div>
            <button class="play-btn" id="startBtn">play</button>
        </div>
        
        <p class="hint">controls: customizable inside settings | pause: p | quit: esc</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- HIGH-DPI CANVAS SETUP ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GAME_WIDTH = 560; const GAME_HEIGHT = 800;
        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = GAME_WIDTH + 'px'; canvas.style.height = GAME_HEIGHT + 'px';
        canvas.width = GAME_WIDTH * dpr; canvas.height = GAME_HEIGHT * dpr;
        ctx.scale(dpr, dpr);

        // --- CONFIG ---
        const config = {
            keys: ['a', 's', 'k', 'l'], lanes: 4, laneWidth: 140, noteRadius: 48,
            hitPosition: 680, hitWindows: { perfect: 0.05, good: 0.1, miss: 0.15 }, 
            currentHitWindows: { perfect: 0.05, good: 0.1, miss: 0.15 }, 
            enableHolds: true, difficulty: 5, scrollSpeed: 1100, style: 'circle', theme: 'minimal' 
        };

        const themes = {
            minimal: { side: '#999999', mid: '#ffffff', activeTrail: 'rgba(255,255,255,0.15)' },
            emerald: { side: '#00b4d8', mid: '#00f5d4', activeTrail: 'rgba(0,245,212,0.15)' },
            ruby:    { side: '#f72585', mid: '#7209b7', activeTrail: 'rgba(114,9,183,0.15)' },
            neon:    { side: '#ff007f', mid: '#39ff14', activeTrail: 'rgba(57,255,20,0.15)' }
        };

        let audioCtx, audioSource, audioBuffer, customHitBuffer, musicGainNode, progressInterval;
        let gameStartTime = 0, isPlaying = false, isPaused = false, animationFrameId;
        let notes = [], ripples = [], activeFlashes = [0, 0, 0, 0], feedbackText = { text: "", alpha: 0, scale: 1, color: "", yOffset: 0 };
        let stats = { score: 0, combo: 0, maxCombo: 0, perfects: 0, goods: 0, misses: 0, total: 0 };
        const keyState = { 0: false, 1: false, 2: false, 3: false };

        // --- SETTINGS UI ---
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const previewCanvas = document.getElementById('previewCanvas');
        const pCtx = previewCanvas.getContext('2d');

        settingsBtn.addEventListener('click', (e) => { e.stopPropagation(); settingsPanel.classList.toggle('open'); drawPreview(); });
        document.addEventListener('click', (e) => { if (!settingsPanel.contains(e.target) && e.target !== settingsBtn) settingsPanel.classList.remove('open'); });

        function updateKeybindUI() { for(let i=0; i<4; i++) document.getElementById(`key${i}`).value = config.keys[i]; }
        updateKeybindUI();

        for(let i=0; i<4; i++) {
            const input = document.getElementById(`key${i}`);
            input.addEventListener('keydown', (e) => {
                e.preventDefault();
                const pressedKey = e.key.toLowerCase();
                if (pressedKey.length === 1 || pressedKey.startsWith('arrow')) {
                    config.keys[i] = pressedKey.replace('arrow', ''); input.value = config.keys[i];
                }
            });
        }

        function drawPreview() {
            pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
            const activePalette = themes[config.theme];
            const pNotes = [{ x: 40, color: activePalette.side }, { x: 120, color: activePalette.mid }];
            pNotes.forEach(n => {
                pCtx.fillStyle = n.color;
                if (config.style === 'circle') { pCtx.beginPath(); pCtx.arc(n.x, 40, 24, 0, Math.PI * 2); pCtx.fill(); } 
                else { pCtx.fillRect(n.x - 30, 25, 60, 20); }
            });
        }

        document.getElementById('noteStyleSelect').addEventListener('change', (e) => { config.style = e.target.value; drawPreview(); });
        document.getElementById('colorThemeSelect').addEventListener('change', (e) => { config.theme = e.target.value; drawPreview(); });
        drawPreview();

        const soundDropzone = document.getElementById('soundDropzone');
        soundDropzone.addEventListener('dragover', (e) => { e.preventDefault(); soundDropzone.classList.add('dragover'); });
        soundDropzone.addEventListener('dragleave', () => soundDropzone.classList.remove('dragover'));
        soundDropzone.addEventListener('drop', async (e) => {
            e.preventDefault(); e.stopPropagation(); soundDropzone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('audio/')) {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const reader = new FileReader();
                reader.onload = async function(evt) {
                    try { customHitBuffer = await audioCtx.decodeAudioData(evt.target.result); soundDropzone.textContent = "sound saved!"; soundDropzone.classList.add('loaded'); } 
                    catch(err) { alert("failed to process sample."); }
                };
                reader.readAsArrayBuffer(file);
            }
        });

        // --- INPUT HANDLING ---
        window.addEventListener('keydown', async (e) => {
            if (e.key === 'Escape' && isPlaying) { endGame("game stopped."); return; }
            if (e.key.toLowerCase() === 'p' && isPlaying) { isPaused = !isPaused; if(isPaused) audioCtx.suspend(); else audioCtx.resume(); return; }
            if (e.repeat || isPaused || !isPlaying || document.activeElement.classList.contains('key-input')) return; 

            const lane = config.keys.indexOf(e.key.toLowerCase().replace('arrow', ''));
            if (lane !== -1) { keyState[lane] = true; activeFlashes[lane] = 1.0; createRipple(lane); handleHit(lane); }
        });
        window.addEventListener('keyup', (e) => {
            const lane = config.keys.indexOf(e.key.toLowerCase().replace('arrow', ''));
            if (lane !== -1) keyState[lane] = false;
        });

        // --- DRAG & DROP TRACK LOGIC ---
        const dropZone = document.getElementById('drop-zone');
        const menuTitle = document.getElementById('menuTitle');
        const menuSubtitle = document.getElementById('menuSubtitle');
        const pWrapper = document.getElementById('progressWrapper');
        const pFill = document.getElementById('progressFill');
        const pPercent = document.getElementById('progressPercent');
        const pEta = document.getElementById('progressETA');
        const menuControls = document.getElementById('menuControls');

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('audio/')) loadAudioFile(file);
            else renderErrorMenu("please drop a valid audio file (.mp3, .wav)");
        });

        async function loadAudioFile(file) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            // Set UI to loading state
            menuTitle.textContent = "loading...";
            menuSubtitle.textContent = "reading file into memory...";
            menuControls.style.display = 'none';
            pWrapper.style.display = 'block';
            pFill.style.width = '0%'; pPercent.textContent = '0%'; pEta.textContent = 'ETA: --s';
            
            const reader = new FileReader();
            
            // 1. File reading progress (up to 20% of the bar)
            reader.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 20;
                    pFill.style.width = `${percent}%`;
                    pPercent.textContent = `${Math.floor(percent)}%`;
                }
            };

            reader.onload = async function(e) {
                menuSubtitle.textContent = "decoding audio (this might take a moment)...";
                
                // 2. Audio Decoding Simulated Progress (20% to 95%)
                const mbSize = file.size / 1048576;
                const estDecodeTimeMs = Math.max(1000, mbSize * 400); // ~400ms per MB heuristic
                const startTime = performance.now();
                
                progressInterval = setInterval(() => {
                    const elapsed = performance.now() - startTime;
                    const percent = 20 + Math.min(75, (elapsed / estDecodeTimeMs) * 75);
                    const timeLeft = Math.max(0, (estDecodeTimeMs - elapsed) / 1000);
                    
                    pFill.style.width = `${percent}%`;
                    pPercent.textContent = `${Math.floor(percent)}%`;
                    pEta.textContent = `ETA: ${timeLeft.toFixed(1)}s`;
                }, 50);

                try {
                    audioBuffer = await audioCtx.decodeAudioData(e.target.result);
                    
                    // 3. Complete (100%)
                    clearInterval(progressInterval);
                    pFill.style.width = `100%`;
                    pPercent.textContent = `100%`;
                    pEta.textContent = `ETA: 0.0s`;
                    menuSubtitle.textContent = "finalizing chart...";
                    
                    // Tiny delay to let the user see the 100% bar before showing the menu
                    setTimeout(() => {
                        renderReadyMenu("audio processed successfully.");
                    }, 400);

                } catch (err) { 
                    clearInterval(progressInterval);
                    renderErrorMenu("error decoding audio."); 
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function renderReadyMenu(msg) {
            dropZone.classList.remove('hidden');
            menuTitle.textContent = "ready.";
            menuSubtitle.innerHTML = msg;
            pWrapper.style.display = 'none';
            menuControls.style.display = 'flex';
            
            document.getElementById('diffSlider').addEventListener('input', (e) => {
                document.getElementById('diffDisplay').textContent = e.target.value;
            });
            document.getElementById('startBtn').onclick = () => {
                config.enableHolds = document.getElementById('holdToggle').checked;
                config.difficulty = parseInt(document.getElementById('diffSlider').value, 10);
                startGame();
            };
        }

        function renderErrorMenu(msg) {
            dropZone.classList.remove('hidden');
            menuTitle.textContent = "rhythm.";
            menuSubtitle.innerHTML = msg;
            pWrapper.style.display = 'none';
            menuControls.style.display = 'none';
        }

        function startGame() {
            dropZone.classList.add('hidden');
            stats = { score: 0, combo: 0, maxCombo: 0, perfects: 0, goods: 0, misses: 0, total: 0 };
            ripples = []; notes = []; isPaused = false;
            
            config.scrollSpeed = 700 + (config.difficulty * 80); 
            const windowScale = Math.max(0.6, 1 - (config.difficulty - 5) * 0.03); 
            config.currentHitWindows = {
                perfect: config.hitWindows.perfect * windowScale,
                good: config.hitWindows.good * windowScale,
                miss: config.hitWindows.miss * windowScale
            };

            generateSmartChart(audioBuffer);
            
            audioSource = audioCtx.createBufferSource();
            audioSource.buffer = audioBuffer;
            musicGainNode = audioCtx.createGain();
            musicGainNode.gain.value = 0.4; 
            audioSource.connect(musicGainNode); musicGainNode.connect(audioCtx.destination);
            audioSource.onended = () => { if (isPlaying) endGame("track finished."); };
            
            gameStartTime = audioCtx.currentTime + 1.5;
            audioSource.start(gameStartTime);
            isPlaying = true;
            gameLoop();
        }

        function endGame(message) {
            isPlaying = false;
            cancelAnimationFrame(animationFrameId);
            if (audioSource) { audioSource.onended = null; try { audioSource.stop(); } catch(e) {} audioSource.disconnect(); }
            if (musicGainNode) musicGainNode.disconnect();
            renderReadyMenu(`${message}<br><br>score: ${stats.score} | acc: ${getAccuracy()} | max combo: ${stats.maxCombo}<br><br>drop another file or click play.`);
        }

        // --- SMART AUDIO ANALYSIS GENERATOR ---
        function generateSmartChart(buffer) {
            notes = [];
            const channelData = buffer.getChannelData(0);
            const chunkSize = Math.floor(buffer.sampleRate * 0.1); 
            let energies = [];
            
            for (let i = 0; i < channelData.length; i += chunkSize) {
                let sum = 0, count = 0;
                for (let j = 0; j < chunkSize && i + j < channelData.length; j += 10) { sum += Math.abs(channelData[i + j]); count++; }
                energies.push(sum / count);
            }
            
            const avgEnergy = energies.reduce((a, b) => a + b, 0) / energies.length;
            const mappingBpm = 70 + (config.difficulty * 10); 
            const beat = 60 / mappingBpm;
            
            let time = 1.5, laneBusyUntil = [0, 0, 0, 0];

            function getFreeLane(atTime) {
                let freeLanes = [];
                for (let i = 0; i < 4; i++) if (laneBusyUntil[i] <= atTime) freeLanes.push(i);
                return freeLanes.length === 0 ? -1 : freeLanes[Math.floor(Math.random() * freeLanes.length)];
            }
            
            while (time < buffer.duration - 2) {
                const chunkIdx = Math.floor(time * 10);
                const energy = energies[chunkIdx] || 0;
                
                if (energy > avgEnergy * 1.6) {
                    if (Math.random() > 0.6 || !config.enableHolds) {
                        let l1 = getFreeLane(time);
                        if (l1 !== -1) {
                            laneBusyUntil[l1] = time + 0.1; let l2 = getFreeLane(time);
                            if (l2 !== -1) { laneBusyUntil[l2] = time + 0.1; notes.push(createNote(time, l1, 0)); notes.push(createNote(time, l2, 0)); } 
                            else notes.push(createNote(time, l1, 0));
                        }
                    } else {
                        let lane = getFreeLane(time);
                        if (lane !== -1) {
                            const holdDuration = beat * [0.5, 1.0, 1.5, 2.0][Math.floor(Math.random() * 4)];
                            laneBusyUntil[lane] = time + holdDuration + 0.1; notes.push(createNote(time, lane, holdDuration));
                        }
                    }
                    time += beat / 2; 
                } else if (energy > avgEnergy * 0.85) {
                    let lane = getFreeLane(time); if (lane !== -1) { laneBusyUntil[lane] = time + 0.1; notes.push(createNote(time, lane, 0)); }
                    time += beat / 2; 
                } else if (energy > avgEnergy * 0.4) {
                    let lane = getFreeLane(time); if (lane !== -1) { laneBusyUntil[lane] = time + 0.1; notes.push(createNote(time, lane, 0)); }
                    time += beat; 
                } else {
                    if (Math.random() > 0.5) { let lane = getFreeLane(time); if (lane !== -1) { laneBusyUntil[lane] = time + 0.1; notes.push(createNote(time, lane, 0)); } }
                    time += beat * 2; 
                }
            }
        }

        function createNote(time, lane, duration) { return { time, lane, duration, hit: false, missed: false, completed: false, isHolding: false, headHit: false }; }

        // --- SOUND EFFECTS ---
        function playHitSound() {
            if (!audioCtx) return;
            const source = audioCtx.createBufferSource();
            const gain = audioCtx.createGain();
            source.connect(gain); gain.connect(audioCtx.destination);

            if (customHitBuffer) {
                source.buffer = customHitBuffer; gain.gain.setValueAtTime(1.0, audioCtx.currentTime); source.start();
            } else {
                const osc = audioCtx.createOscillator(); osc.connect(gain); osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
        }
        function playMissSound() {
            if (!audioCtx || customHitBuffer) return; 
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.15); osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        // --- GAME LOGIC ENGINE ---
        function getAccuracy() { return stats.total === 0 ? "100.00%" : (((stats.perfects + (stats.goods * 0.5)) / stats.total) * 100).toFixed(2) + "%"; }
        function createRipple(lane) { ripples.push({ x: lane * config.laneWidth + config.laneWidth / 2, y: config.hitPosition, radius: config.noteRadius, alpha: 0.5 }); }

        function registerHit(judgment) {
            stats.total++;
            if (judgment === "perfect") { stats.combo++; stats.perfects++; stats.score += 300; playHitSound(); showFeedback("perfect", "#ffffff"); } 
            else if (judgment === "good") { stats.combo++; stats.goods++; stats.score += 100; playHitSound(); showFeedback("good", "#888888"); } 
            else { stats.combo = 0; stats.misses++; playMissSound(); showFeedback("miss", "#ff3333"); }
            if (stats.combo > stats.maxCombo) stats.maxCombo = stats.combo;
        }

        function handleHit(lane) {
            const currentAudioTime = audioCtx.currentTime - gameStartTime;
            let targetNote = notes.find(n => n.lane === lane && !n.completed && !n.missed && !n.isHolding);
            if (!targetNote) return;

            const timeDiff = Math.abs(targetNote.time - currentAudioTime);
            if (timeDiff <= config.currentHitWindows.miss) {
                let judgment = timeDiff <= config.currentHitWindows.perfect ? "perfect" : timeDiff <= config.currentHitWindows.good ? "good" : "miss";
                if (judgment !== "miss") {
                    targetNote.headHit = true; registerHit(judgment); 
                    if (targetNote.duration > 0) targetNote.isHolding = true; else { targetNote.completed = true; targetNote.hit = true; }
                } else { targetNote.missed = true; targetNote.completed = true; registerHit("miss"); }
            }
        }
        function showFeedback(text, color) { feedbackText = { text, color, alpha: 1.0, scale: 1.2, yOffset: 0 }; }

        // --- CORE DRAW LOOP ---
        function gameLoop() {
            if (!isPlaying) return;
            animationFrameId = requestAnimationFrame(gameLoop);
            const currentAudioTime = audioCtx.currentTime - gameStartTime;
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            const activePalette = themes[config.theme];

            for (let i = 0; i < config.lanes; i++) {
                const x = i * config.laneWidth; const centerX = x + config.laneWidth / 2;
                ctx.strokeStyle = '#111'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GAME_HEIGHT); ctx.stroke();

                if (activeFlashes[i] > 0 && !isPaused) {
                    const gradient = ctx.createLinearGradient(0, config.hitPosition, 0, 0);
                    gradient.addColorStop(0, `rgba(255, 255, 255, ${activeFlashes[i] * 0.08})`); gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.fillStyle = gradient; ctx.fillRect(x, 0, config.laneWidth, config.hitPosition); activeFlashes[i] -= 0.05; 
                }

                ctx.lineWidth = 3; ctx.strokeStyle = keyState[i] ? '#aaa' : '#333'; ctx.fillStyle = keyState[i] ? '#222' : '#0a0a0a';
                if (config.style === 'circle') { ctx.beginPath(); ctx.arc(centerX, config.hitPosition, config.noteRadius, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); } 
                else { ctx.fillRect(x + 10, config.hitPosition - 16, config.laneWidth - 20, 32); ctx.strokeRect(x + 10, config.hitPosition - 16, config.laneWidth - 20, 32); }
            }

            if (!isPaused) {
                for (let i = ripples.length - 1; i >= 0; i--) {
                    const r = ripples[i]; ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${r.alpha})`; ctx.lineWidth = 2; ctx.stroke(); r.radius += 4; r.alpha -= 0.04;
                    if (r.alpha <= 0) ripples.splice(i, 1);
                }
            }

            for (let note of notes) {
                if (note.completed) continue;
                const timeUntilHit = note.time - currentAudioTime;
                
                if (note.isHolding && !isPaused) {
                    if (!keyState[note.lane]) { note.isHolding = false; note.completed = true; note.missed = true; registerHit("miss"); } 
                    else if (currentAudioTime >= note.time + note.duration) { note.isHolding = false; note.completed = true; note.hit = true; registerHit("perfect"); }
                }

                if (timeUntilHit < -config.currentHitWindows.miss && !note.headHit && !note.missed) { note.missed = true; note.completed = true; registerHit("miss"); }
                if (note.missed) continue;

                let yHead = config.hitPosition - (timeUntilHit * config.scrollSpeed);
                const tailTimeUntilHit = (note.time + note.duration) - currentAudioTime;
                let yTail = config.hitPosition - (tailTimeUntilHit * config.scrollSpeed);
                if (note.isHolding) yHead = config.hitPosition;

                if (yTail < GAME_HEIGHT + 200 && yHead > -500) {
                    const xPos = note.lane * config.laneWidth; const centerX = xPos + config.laneWidth / 2;
                    const c = (note.lane === 0 || note.lane === 3) ? activePalette.side : activePalette.mid;
                    
                    if (note.duration > 0) {
                        ctx.fillStyle = activePalette.activeTrail; const bodyHeight = yHead - yTail;
                        if (bodyHeight > 0) {
                            if (config.style === 'circle') { ctx.fillRect(centerX - config.noteRadius, yTail, config.noteRadius * 2, bodyHeight); ctx.beginPath(); ctx.arc(centerX, yTail, config.noteRadius, 0, Math.PI * 2); ctx.fill(); } 
                            else ctx.fillRect(xPos + 10, yTail, config.laneWidth - 20, bodyHeight);
                        }
                    }

                    ctx.fillStyle = c;
                    if (config.style === 'circle') { ctx.beginPath(); ctx.arc(centerX, yHead, config.noteRadius, 0, Math.PI * 2); ctx.fill(); } 
                    else ctx.fillRect(xPos + 10, yHead - 16, config.laneWidth - 20, 32);
                }
            }

            ctx.fillStyle = '#666'; ctx.font = '400 16px "DM Sans"'; ctx.textAlign = 'left'; ctx.fillText(`score: ${stats.score}`, 20, 40);
            ctx.textAlign = 'center'; ctx.fillText(`acc: ${getAccuracy()}`, GAME_WIDTH / 2, 40);
            ctx.textAlign = 'right'; ctx.fillStyle = stats.misses > 0 ? '#ff5555' : '#666'; ctx.fillText(`miss: ${stats.misses}`, GAME_WIDTH - 20, 40);

            if (feedbackText.alpha > 0 && !isPaused) {
                ctx.save(); feedbackText.yOffset -= 1; ctx.translate(GAME_WIDTH / 2, config.hitPosition - 160 + feedbackText.yOffset);
                ctx.scale(feedbackText.scale, feedbackText.scale); ctx.fillStyle = feedbackText.color; ctx.globalAlpha = feedbackText.alpha;
                ctx.font = '400 28px "DM Sans"'; ctx.textAlign = 'center'; ctx.fillText(feedbackText.text, 0, 0); ctx.restore();
                feedbackText.alpha -= 0.02; if (feedbackText.scale > 1.0) feedbackText.scale -= 0.01;
            }

            if (stats.combo > 5) {
                const comboScale = isPaused ? 1 : 1 + (Math.sin(currentAudioTime * Math.PI * 8) * 0.05);
                ctx.save(); ctx.translate(GAME_WIDTH / 2, GAME_HEIGHT / 2 - 80); ctx.scale(comboScale, comboScale);
                ctx.fillStyle = '#eeeeee'; ctx.font = '700 48px "DM Sans"'; ctx.textAlign = 'center'; ctx.fillText(`${stats.combo}`, 0, 0);
                ctx.font = '400 16px "DM Sans"'; ctx.fillStyle = '#666'; ctx.fillText("combo", 0, 25); ctx.restore();
            }

            if (isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.fillStyle = '#ffffff'; ctx.font = '700 40px "DM Sans"'; ctx.textAlign = 'center'; ctx.fillText('PAUSED', GAME_WIDTH / 2, GAME_HEIGHT / 2);
            }
        }
    </script>
</body>
